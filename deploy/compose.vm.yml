# OmniVar Navigator — VM deployment stack (plan Phase 9). Docker-only on the VM.
# Bring up:  docker compose -f deploy/compose.vm.yml up -d --build
# LLM is cloud Nemotron (NVIDIA NIM) — no local GPU LLM container; api/worker read
# NVIDIA_API_KEY from the environment (.env, git-ignored). Reference data is bind-
# mounted read-only. The Caddy proxy terminates TLS + auth in front of everything.
services:
  api:
    build: { context: .., dockerfile: docker/Dockerfile.api }
    image: ghcr.io/ahmedanees-m/omnivar-navigator-api:${TAG:-latest}
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NEMOTRON_MODEL=${NEMOTRON_MODEL:-nvidia/llama-3.3-nemotron-super-49b-v1}
      - DATABASE_URL=postgresql://omnivar:${DB_PASSWORD}@db:5432/omnivar
      - VECTORSTORE_URL=http://vectorstore:6333
    volumes:
      - ${DATA_DIR:-./data}:/app/data:ro          # reference data, read-only
    depends_on: [db, vectorstore]
    restart: unless-stopped

  worker:
    build: { context: .., dockerfile: docker/Dockerfile.worker }
    image: ghcr.io/ahmedanees-m/omnivar-navigator-worker:${TAG:-latest}
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DATABASE_URL=postgresql://omnivar:${DB_PASSWORD}@db:5432/omnivar
    volumes:
      - ${DATA_DIR:-./data}:/app/data:ro
    depends_on: [db]
    restart: unless-stopped

  ui:
    image: ghcr.io/ahmedanees-m/omnivar-navigator-ui:${TAG:-latest}
    depends_on: [api]
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=omnivar
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=omnivar
    volumes: [omnivar-db:/var/lib/postgresql/data]
    restart: unless-stopped

  vectorstore:                                    # RAG (PM3/PS1) + case memory
    image: qdrant/qdrant:latest
    volumes: [omnivar-qdrant:/qdrant/storage]
    restart: unless-stopped

  proxy:                                          # TLS + auth in front of api + ui
    image: caddy:2
    ports: ["443:443", "80:80"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on: [api, ui]
    restart: unless-stopped

  # Optional local "fast" LLM (Qwen) for the notes->HPO route; the reasoning route
  # uses cloud Nemotron. Uncomment + attach the GPU only if you want on-VM inference.
  # ollama:
  #   image: ollama/ollama:latest
  #   deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }
  #   volumes: [ollama:/root/.ollama]

volumes:
  omnivar-db: {}
  omnivar-qdrant: {}
  caddy-data: {}
