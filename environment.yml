# Conda environment for OmniVar Navigator (plan §2.1).
# Pinned at execution time; re-verify versions. This file defines the laptop dev
# env AND the contents of the API image (one source of truth).
name: omnivar-nav
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - numpy
  - scipy
  - pandas
  - scikit-learn          # calibration, ancestry classifier, baselines
  - cyvcf2                # VCF/variant I/O
  - pysam
  - htslib
  - pyhpo                 # HPO semantic similarity (PP4)
  - requests
  - httpx                 # gnomAD/ClinVar/MaveDB/eRepo APIs
  - pyyaml
  - matplotlib
  - seaborn
  - pydantic
  - fastapi
  - uvicorn
  - paramiko              # VM orchestration over SSH/SFTP
  - pytest
  - ruff
  - black
  - pip
  - pip:
      - openai                # cloud Nemotron (NVIDIA NIM, OpenAI-compatible)
      - mavedb                # MaveDB API client
      - pangolin              # splice scoring (SpliceAI replacement)
      - somalier              # or peddy - ancestry/relatedness from VCF
      # external tools (autoPVS1, AutoPM3, Exomiser, VEP) installed in tool images,
      # wrapped via adapters.
