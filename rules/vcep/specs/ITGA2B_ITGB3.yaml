# Glanzmann thrombasthenia - ClinGen Platelet Disorder VCEP (ITGA2B/ITGB3).
# VERIFIED: Ross et al., Blood Advances 2021;5(2):414-431 (PMID 33496739); applying these
# criteria cut VUS from 29% to 20% on 70 pilot variants; 16 gene-specified rules (7 with
# adjustable strength).
#
# AF thresholds + PM2 strength below are NO LONGER placeholders: they were triangulated
# from the VCEP's own 608 ITGA2B/ITGB3 records in the ClinGen Evidence Repository (the
# applied-evidence narratives state the cut-offs verbatim, 2026-06-13):
#   BA1: narrative "meeting the GT-specific BA1 threshold of >0.0024"
#   BS1: stated as >0.00158 (6 records; the 2021 publication's early value differed and is
#        superseded - the >0.00158 figure is the one the VCEP currently applies in eRepo)
#   PM2: applied at SUPPORTING strength in 509/509 PM2 records (zero Moderate), AF <0.0001
# Cross-check: the GT spec CSpec PDF is image-only (not machine-readable); eRepo is the
# authoritative record of what the panel actually applied. gnomAD v2.1.1.
spec_id: PD-VCEP-ITGA2B_ITGB3
genes: [ITGA2B, ITGB3]
disease: Glanzmann thrombasthenia
inheritance: AR
mechanism: integrin_expression
source: "Ross et al., Blood Adv 2021;5(2):414-431 (PMID 33496739); ClinGen PD-VCEP; AF/strength from ERepo applied records"
covered: true
prior_p: 0.10
af:
  ba1: 0.0024       # ERepo-verified: "GT-specific BA1 threshold of >0.0024"
  bs1: 0.00158      # ERepo-verified current value; the 2021 paper text used 0.0014, superseded by Platelet Specs v2
  pm2: 0.0001       # ERepo-verified: PM2_Supporting applied below 0.0001
code_strengths:
  PM2: PP           # VERIFIED Supporting (509/509 PM2 records in ERepo; recessive GT spec)
notes: >
  GT is AR; the highest-stakes confuser LAD-III (FERMT3) is NOT VCEP-covered (cluster
  asymmetry). Computational evidence is REVEL-based per Ross 2021 (PP3/BP4); the exact
  GT REVEL cut-offs were not text-verified here (spec PDF is image-only) and are left at
  ACMG default. PVS1 and PS4 are variant-dependent decision trees (PVS1 by NMD/domain;
  PS4 by proband ratio) and cannot be a single static strength; baseline ACMG strength is
  used and the tree is a documented future task. Routed codes (PP4/PS3/PM3/PP1) live in
  other DISCERN factors, not here.
