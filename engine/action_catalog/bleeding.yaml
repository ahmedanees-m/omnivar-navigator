# Bleeding & platelet disorders action catalog (plan Phase 2, §4.2 / §7).
# Mechanism-keyed: the same code (e.g. PS3) is generated by different assays
# depending on the gene's disease mechanism. This is essential -- e.g. an
# *activation*-defect gene (FERMT3/LAD-III) has NORMAL expression, so expression
# flow cytometry must NOT be recommended for it.
#
# Gene scope anchors on the ISTH-SSC Tier-1 BTPD list (Megy et al. 2019).
# sens/spec/cost are literature-seeded priors, explicitly versioned, and updated
# per-institution by the learning loop (Phase 5.2). They are NOT final values.
version: "bleeding-pack-0.1.0-draft"

mechanisms:
  integrin_expression:        # ITGA2B, ITGB3 (Glanzmann) -- protein absent/reduced
    PS3: [flow_cd41_cd61, lta_panel, clot_retraction]
  integrin_activation:        # FERMT3 (LAD-III), RASGRP2 -- protein PRESENT but inactive
    PS3: [platelet_activation_pac1, soluble_fibrinogen_binding, lta_panel]  # NOT expression flow
  gpib_complex:               # GP1BA/B, GP9 (Bernard-Soulier)
    PS3: [flow_cd42a_cd42b, ripa_absent]
  leukocyte_adhesion_b2:      # ITGB2 (LAD-I)
    PS3: [flow_cd18_cd11a]
  coag_factor:                # F8, F9, F7, F10, F11, F5, F13, FGA/B/G, F2
    PS3: [factor_activity_assay, thrombin_generation, mixing_study]
  vwf:                        # VWF (subtype-aware)
    PS3: [vwf_fviii_binding, vwf_multimers, vwf_rco_gpibm, ripa_low_dose]
  dense_granule:              # HPS1-11, LYST, AP3B1
    PS3: [wholemount_em, mepacrine_uptake, lumiaggregometry_secretion]
  alpha_granule:              # NBEAL2, GFI1B (Gray platelet)
    PS3: [immunofluorescence_granule, electron_microscopy, blood_film]

actions:
  flow_cd41_cd61:            {yields: [PS3],      cost_usd: 450,  days: 7,  sens: 0.90, spec: 0.92, modality: functional}
  platelet_activation_pac1:  {yields: [PS3],      cost_usd: 700,  days: 10, sens: 0.85, spec: 0.90, modality: functional}
  soluble_fibrinogen_binding:{yields: [PS3],      cost_usd: 700,  days: 10, sens: 0.84, spec: 0.90, modality: functional}
  flow_cd42a_cd42b:          {yields: [PS3],      cost_usd: 450,  days: 7,  sens: 0.88, spec: 0.92, modality: functional}
  flow_cd18_cd11a:           {yields: [PS3],      cost_usd: 450,  days: 7,  sens: 0.90, spec: 0.93, modality: functional}
  vwf_fviii_binding:         {yields: [PS3, BS3], cost_usd: 600,  days: 14, sens: 0.85, spec: 0.90, modality: functional}
  vwf_multimers:             {yields: [PS3],      cost_usd: 550,  days: 14, sens: 0.80, spec: 0.88, modality: functional}
  factor_activity_assay:     {yields: [PS3, BS3], cost_usd: 250,  days: 5,  sens: 0.92, spec: 0.95, modality: functional}
  thrombin_generation:       {yields: [PS3],      cost_usd: 400,  days: 10, sens: 0.78, spec: 0.88, modality: functional}
  lta_panel:                 {yields: [PS3],      cost_usd: 500,  days: 7,  sens: 0.82, spec: 0.88, modality: functional}
  clot_retraction:           {yields: [PS3],      cost_usd: 300,  days: 5,  sens: 0.75, spec: 0.85, modality: functional}
  rna_seq_splice:            {yields: [PS3, BS3], cost_usd: 900,  days: 28, sens: 0.78, spec: 0.92, modality: rna}
  rt_pcr_splice:             {yields: [PS3, BS3], cost_usd: 400,  days: 14, sens: 0.72, spec: 0.90, modality: rna}
  trio_testing:              {yields: [PS2, PM3], cost_usd: 1200, days: 21, sens: 0.72, spec: 0.99, modality: segregation}
  family_segregation:        {yields: [PP1, BS4], cost_usd: 800,  days: 21, sens: 0.65, spec: 0.95, modality: segregation}
