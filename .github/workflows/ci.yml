name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (lightweight, no heavy bio deps)
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest ruff black
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
