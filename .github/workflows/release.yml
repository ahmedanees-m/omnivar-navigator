name: release

# Build the service images and push them to GHCR on a version tag, so anyone can
# `docker compose -f deploy/compose.vm.yml up` and reproduce. A GitHub Release also
# triggers the GitHub–Zenodo integration to mint a DOI (plan Phase 8).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omnivar-navigator-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/omnivar-navigator-${{ matrix.image }}:latest
