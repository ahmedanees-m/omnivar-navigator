# Curated published-case benchmark (v3.1 Track B4). REAL published cases, CITATIONS ONLY -
# no patient identifiers (Gate G7). Each case = the presenting discriminating features (as
# DISCERN feature ids), the cluster, the causal gene, the true diagnosis, and the source PMID.
# Small-n by design; the diagnosis-accuracy headline needs the cohorts (Tier B/C). Features are
# the documented presentation of the cited case type, not any individual's record.
cases:
  - id: lad3_infections
    cluster: integrin
    gene: FERMT3
    true_dx: lad3
    source_pmid: "30789846"
    features: {glanzmann_type_bleeding: true, leukocytosis: true, recurrent_infections: true, aiib3_expression_absent: false}
  - id: ptvwd_platelet_ripa
    cluster: vwf_gpib
    gene: GP1BA
    true_dx: ptvwd
    source_pmid: "22102188"
    features: {ripa_low_dose_enhanced: true, ripa_mixing_platelet_origin: true}
  - id: vwd2b_plasma_ripa
    cluster: vwf_gpib
    gene: VWF
    true_dx: vwd2b
    source_pmid: "25477497"
    features: {ripa_low_dose_enhanced: true, ripa_mixing_plasma_origin: true}
  - id: bss_as_itp
    cluster: macrothrombocytopenia
    gene: GP1BA
    true_dx: bss
    source_pmid: "33496739"
    features: {macrothrombocytopenia: true, giant_platelets: true, flow_cd42_reduced: true}
  - id: runx1_fpdmm_as_itp
    cluster: thr_leukemia
